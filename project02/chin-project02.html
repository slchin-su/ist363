<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MET Randomizer</title>
    <link rel="stylesheet" href="project02-stylesheet.css">
    <script src="chin-project02.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,200..900;1,200..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <img src="images/museum-logo.png" alt="Museum logo" id="logo">
        <div id="header-links">
            <a class="link" href="url">Visit</a>
            <a class="link" href="url">Exhibitions</a>
            <a class="link" href="url">About</a>
            <a class="link" href="url">Donate</a>
        </div>
    </header>
    <div id="wrapper">
        <h1>Met Museum Object Exploration</h1>
        <main>
            <div id="object-card">
                <img src="images/placeholder-image.png" alt="paintingimage" id="object-image">
                <div>
                    <div>
                        <div id="title">Title</div>
                        <br>
                            <strong>Artist:</strong> <span id="artist"></span>
                            <br>
                            <strong>Date:</strong> <span id="date"></span>
                            <br>
                            <strong>Medium:</strong> <span id="medium"></span>
                    </div>
                    <br>
                    <button id="refresh">
                        Click Me!
                        <!-- Refresh
                        <img src="images/arrows-rotate-solid.png" alt="refresh-logo" id="refresh-icon"> -->

                    </button>
                </div>
            </div>
        </main>
        <section>
            <div id="bookstitle">Books About the Artist</div>
            <div id="books">
                <div>
                    <img src="images/default-book.png" alt="bookcover1" class="bookcover" id="bookcover1">
                    <p><strong>Title:</strong> <span id="booktitle1"></span>
                    <br>
                    <strong>Author:</strong> <span id="bookauthor1"></span>
                    <br>
                    <strong>Date:</strong> <span id="bookdate1"></span>
                    </p>
                </div>
                <div>
                    <img src="images/default-book.png" alt="bookcover2" class="bookcover" id="bookcover2">
                    <p><strong>Title:</strong> <span id="booktitle2"></span>
                    <br>
                    <strong>Author:</strong> <span id="bookauthor2"></span>
                    <br>
                    <strong>Date:</strong> <span id="bookdate2"></span>
                    </p>
                    
                </div>
                <div>
                    <img src="images/default-book.png" alt="bookcover3" class="bookcover" id="bookcover3">
                    <p><strong>Title:</strong> <span id="booktitle3"></span>
                    <br>
                    <strong>Author:</strong><span id="bookauthor3"></span>
                    <br>
                    <strong>Date:</strong> <span id="bookdate3"></span>
                    </p>
                </div>
            </div>
        </section>
        <section>
            <h1 id="gallerytitle">Step Into the Gallery</h1>
            <img src="images/EuropeanArt0.jpeg" alt="European Paintings Gallery" id="full-image">
            <div id="gallerybox">
                <img src ="images/EuropeanArt1.jpg" alt="Europeanpaintings1" class="galleryimage">
                <img src ="images/EuropeanArt2.jpeg" alt="Europeanpaintings2" class="galleryimage">
                <img src ="images/EuropeanArt3.jpg" alt="Europeanpaintings3" class="galleryimage">
            </div>
        </section>
            
    
    </div>
    <footer>
        <p>
            Creator: Sarah Chin
        </p>
        <p>
           IST 363 Project 2 | Professor Scharf
        </p>
        
    </footer>
</body>
</html>
